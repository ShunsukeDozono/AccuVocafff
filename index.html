<head>
  <meta charset="utf-8">

  <style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #050605;
    color: #E8F0E8;

  body {
    min-height: 100vh;

  button:active { transform: translateY(1px); }
  input::placeholder { color: #3A443A; }

  /* Animations */
  @keyframes glitch {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-3px) skewX(-1deg); }
    40% { transform: translateX(3px) skewX(1deg); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }
  @keyframes tickerScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes okIn {

  /* phone */

    width: 390px; height: 820px;
    border-radius: 44px;
    background: #0A0B0A;

    position: relative;
  }

    content: ''; position: absolute;

        rgba(0,0,0,0) 0px,

        rgba(0,0,0,0) 4px

  .crt-vignette {

  .home-indicator {

  }

  }

  .caption {
    text-align: center; margin-top: 18px;

    font-size: 10px; color: #9EFF00;

  <!-- Screens (components) -->
  <script type="text/babel" data-presets="react">
// AccuVoca Terminal — screens module
// Retro-digital / Bloomberg-style financial terminal aesthetic

const { useState, useEffect, useRef, useMemo } = React;

// ─── design tokens ──────────────────────────────────────────
const TC = {
  bg: '#0A0B0A',
  panel: '#111311',
  panelHi: '#171A17',
  line: '#1F231F',
  lineHi: '#2A2F2A',
  dim: '#5A6A5A',
  mid: '#8FA68F',
  ink: '#E8F0E8',
  green: '#9EFF00',
  greenDim: '#5FA800',
  amber: '#FFB800',
  amberDim: '#8F6700',
  red: '#FF3D3D',
  redDim: '#8F1F1F',
  blue: '#5FB4FF',
};

// ─── word bank ──────────────────────────────────────────────
const WORDS = [
  { en: 'accrual', ja: '発生主義', cat: 'BASIC' },
  { en: 'debit', ja: '借方', cat: 'BASIC' },
  { en: 'credit', ja: '貸方', cat: 'BASIC' },
  { en: 'asset', ja: '資産', cat: 'BASIC' },
  { en: 'liability', ja: '負債', cat: 'BASIC' },
  { en: 'equity', ja: '資本', cat: 'BASIC' },
  { en: 'revenue', ja: '収益', cat: 'BASIC' },
  { en: 'expense', ja: '費用', cat: 'BASIC' },
  { en: 'depreciation', ja: '減価償却', cat: 'BASIC' },
  { en: 'amortization', ja: '償却', cat: 'BASIC' },
  { en: 'goodwill', ja: 'のれん', cat: 'BASIC' },
  { en: 'inventory', ja: '棚卸資産', cat: 'BASIC' },
  { en: 'receivable', ja: '売掛金', cat: 'BASIC' },
  { en: 'payable', ja: '買掛金', cat: 'BASIC' },
  { en: 'impairment', ja: '減損', cat: 'BASIC' },
  { en: 'audit', ja: '監査', cat: 'AUDIT' },
  { en: 'assertion', ja: 'アサーション', cat: 'AUDIT' },
  { en: 'materiality', ja: '重要性', cat: 'AUDIT' },
  { en: 'disclosure', ja: '開示', cat: 'FS' },
  { en: 'deferred', ja: '繰延の', cat: 'TAX' },
];

const pick = (arr, n, exclude = []) => {
  const pool = arr.filter(x => !exclude.includes(x));
  const out = [];
  const copy = [...pool];
  while (out.length < n && copy.length) {
    out.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0]);
  }
  return out;
};

// ─── typewriter hook ────────────────────────────────────────
function useTypewriter(text, speed = 24) {
  const [out, setOut] = useState('');
  useEffect(() => {
    setOut('');
    let i = 0;
    const iv = setInterval(() => {
      i++;
      setOut(text.slice(0, i));
      if (i >= text.length) clearInterval(iv);
    }, speed);
    return () => clearInterval(iv);
  }, [text, speed]);
  return out;
}

// ─── ticker (always visible, top) ──────────────────────────
function Ticker({ items }) {
  const line = items.map(it => (
    `${it.sym}  ${it.val}  ${it.chg >= 0 ? '▲' : '▼'}${Math.abs(it.chg).toFixed(2)}%`
  )).join('     ·     ');
  const repeated = `${line}     ·     ${line}     ·     ${line}`;
  return (
    <div style={{
      height: 22, borderBottom: `1px solid ${TC.lineHi}`,
      background: TC.panel, overflow: 'hidden', position: 'relative',
      display: 'flex', alignItems: 'center',
    }}>
      <div style={{
        position: 'absolute', left: 0, top: 0, bottom: 0,
        width: 38, background: TC.amber, color: TC.bg,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'JetBrains Mono, monospace', fontSize: 9, fontWeight: 700,
        letterSpacing: 0.5, zIndex: 2,
      }}>LIVE</div>
      <div style={{
        paddingLeft: 46, whiteSpace: 'nowrap',
        fontFamily: 'JetBrains Mono, monospace',
        fontSize: 10, color: TC.mid, letterSpacing: 0.5,
        animation: 'tickerScroll 45s linear infinite',
      }}>
        {repeated.split('·').map((seg, i) => {
          const hasUp = seg.includes('▲');
          const hasDown = seg.includes('▼');
          return (
            <span key={i} style={{ color: hasUp ? TC.green : hasDown ? TC.red : TC.mid }}>
              {seg}·
            </span>
          );
        })}
      </div>
    </div>
  );
}

// ─── shared chrome: status-line at bottom of screens ──────
function StatusLine({ left, mid, right }) {
  const [blink, setBlink] = useState(true);
  useEffect(() => {
    const iv = setInterval(() => setBlink(b => !b), 550);
    return () => clearInterval(iv);
  }, []);
  return (
    <div style={{
      height: 22, borderTop: `1px solid ${TC.lineHi}`,
      background: TC.panel, display: 'flex', alignItems: 'center',
      padding: '0 10px', fontFamily: 'JetBrains Mono, monospace',
      fontSize: 9, color: TC.dim, letterSpacing: 0.5, gap: 10,
    }}>
      <span style={{ color: TC.green }}>● {left}</span>
      <span style={{ flex: 1, textAlign: 'center', color: TC.mid }}>{mid}</span>
      <span>{right}</span>
      <span style={{ color: TC.green, opacity: blink ? 1 : 0 }}>▌</span>
    </div>
  );
}

// ─── boot / login ──────────────────────────────────────────
function BootScreen({ nav, setPlayer }) {
  const [step, setStep] = useState(0);
  const [name, setName] = useState('');
  const [err, setErr] = useState('');
  const bootLines = [
    '> ACCUVOCA TERMINAL v1.0.0',
    '> (c) 2026 · ACCOUNTING VOCAB DIVISION',
    '> CHECKING SYSTEM ...... OK',
    '> LOADING WORD BANK .... OK (20 ENTRIES)',
    '> SESSION READY',
    '',
    '> PLEASE IDENTIFY:',
  ];
  useEffect(() => {
    if (step >= bootLines.length) return;
    const t = setTimeout(() => setStep(step + 1), step === 0 ? 300 : 260);
    return () => clearTimeout(t);
  }, [step]);

  const submit = () => {
    if (!name.trim()) { setErr('NICKNAME REQUIRED'); return; }
    if (name.length > 12) { setErr('MAX 12 CHARS'); return; }
    setPlayer({ nickname: name.toUpperCase(), weekCorrect: 0, weekRank: '-', streak: 1 });
    nav('home');
  };

  return (
    <div style={{
      padding: '16px 14px', minHeight: '100%',
      display: 'flex', flexDirection: 'column',
      fontFamily: 'JetBrains Mono, monospace', color: TC.green, fontSize: 12,
    }}>
      <div style={{ flex: 1 }}>
        {bootLines.slice(0, step).map((l, i) => (
          <div key={i} style={{
            lineHeight: 1.7,
            color: l.startsWith('>') ? TC.green : TC.dim,
          }}>
            {l || '\u00A0'}
          </div>
        ))}
        {step >= bootLines.length && (
          <div style={{ marginTop: 14 }}>
            <div style={{ color: TC.mid, fontSize: 10, marginBottom: 6, letterSpacing: 1 }}>
              NICKNAME &gt;
            </div>
            <div style={{
              display: 'flex', alignItems: 'center',
              border: `1px solid ${TC.lineHi}`, background: TC.panel,
            }}>
              <span style={{
                padding: '10px 10px', color: TC.amber, fontSize: 12,
                borderRight: `1px solid ${TC.lineHi}`,
              }}>$</span>
              <input
                value={name}
                onChange={e => { setName(e.target.value); setErr(''); }}
                onKeyDown={e => e.key === 'Enter' && submit()}
                maxLength={12}
                autoFocus
                placeholder="ENTER NAME_"
                style={{
                  flex: 1, padding: '10px 10px',
                  background: 'transparent', border: 'none',
                  color: TC.ink, fontFamily: 'inherit', fontSize: 12,
                  letterSpacing: 1, textTransform: 'uppercase',
                  outline: 'none',
                }}
              />
            </div>
            {err && (
              <div style={{ marginTop: 8, color: TC.red, fontSize: 10 }}>
                [ERR] {err}
              </div>
            )}
            <button onClick={submit} style={{
              marginTop: 20, width: '100%', padding: '14px',
              background: TC.green, border: 'none', color: TC.bg,
              fontFamily: 'inherit', fontSize: 12, fontWeight: 700,
              letterSpacing: 2, cursor: 'pointer',
            }}>
              [ ENTER ] ▶
            </button>
            <div style={{
              marginTop: 18, fontSize: 9, color: TC.dim,
              lineHeight: 1.7, letterSpacing: 0.5,
            }}>
              NO PASSWORD REQUIRED.<br/>
              NICKNAME IS PUBLIC ON LEADERBOARD.
            </div>
          </div>
        )}
      </div>
      <div style={{ fontSize: 9, color: TC.dim, letterSpacing: 1, marginTop: 12 }}>
        — END OF BOOT SEQUENCE —
      </div>
    </div>
  );
}

// ─── home / dashboard ──────────────────────────────────────
function HomeScreen({ nav, player }) {
  const now = useMemo(() => {
    const d = new Date();
    return d.toTimeString().slice(0, 8);
  }, []);
  return (
    <div style={{ minHeight: '100%', display: 'flex', flexDirection: 'column' }}>
      {/* brand bar */}
      <div style={{
        padding: '14px 14px 12px',
        borderBottom: `1px solid ${TC.lineHi}`,
      }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
          <div style={brandStyle}>ACCUVOCA</div>
          <div style={{
            fontFamily: 'JetBrains Mono, monospace', fontSize: 9,
            color: TC.amber, letterSpacing: 1.5,
          }}>TERMINAL</div>
          <div style={{ flex: 1 }}/>
          <div style={{
            fontFamily: 'JetBrains Mono, monospace', fontSize: 10,

          }}>{now}</div>
        </div>
        <div style={{
          fontFamily: 'JetBrains Mono, monospace', fontSize: 9,

        }}>// ACCOUNTING VOCABULARY · EN⇄JA</div>
      </div>

      {/* greeting row */}
      <div style={{
        padding: '14px 14px', borderBottom: `1px solid ${TC.line}`,

      {/* mode select */}

        <ModeRow

        />
      </div>

      {/* footer nav */}
      <div style={{ flex: 1 }}/>
      <div style={{
        display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 1,

        <FooterBtn onClick={() => nav('ranking')}>

// ─── study mode ────────────────────────────────────────────
function StudyScreen({ nav, finish }) {
  const TOTAL = 10;
  const [qIdx, setQIdx] = useState(0);
  const [questions] = useState(() => {
    const chosen = pick(WORDS, TOTAL);
    return chosen.map(w => {
      const wrongs = pick(WORDS.filter(x => x !== w), 3);
      const direction = Math.random() < 0.5 ? 'en2ja' : 'ja2en';
      const opts = [w, ...wrongs].sort(() => Math.random() - 0.5);
      return { word: w, direction, options: opts, correctIdx: opts.indexOf(w) };
    });
  });
  const [selected, setSelected] = useState(null);
  const [correct, setCorrect] = useState(0);
  const [fb, setFb] = useState(null); // 'OK' | 'ERR'

  const q = questions[qIdx];
  const prompt = q.direction === 'en2ja' ? q.word.en : q.word.ja;
  const isEn = q.direction === 'en2ja';
  const shown = useTypewriter(prompt, 30);

  const choose = (i) => {
    if (selected !== null) return;
    setSelected(i);
    const ok = i === q.correctIdx;
    setFb(ok ? 'OK' : 'ERR');
    if (ok) setCorrect(c => c + 1);
    setTimeout(() => {
      setFb(null);
      if (qIdx + 1 >= TOTAL) {
        const finalCorrect = ok ? correct + 1 : correct;
        finish({ mode: 'study', correct: finalCorrect, total: TOTAL, score: finalCorrect * 10, time: 0 });
      } else {
        setQIdx(qIdx + 1);
        setSelected(null);
      }
    }, ok ? 700 : 1300);
  };

  return (
    <div style={{ minHeight: '100%', display: 'flex', flexDirection: 'column', position: 'relative' }}>
      {/* header */}
      <div style={{
        padding: '12px 14px',
        borderBottom: `1px solid ${TC.lineHi}`,
        display: 'flex', alignItems: 'center', gap: 10,
      }}>
        <button onClick={() => nav('home')} style={backBtn}>&lt; ESC</button>
        <div style={{ flex: 1 }}>
          <div style={labelStyle}>STUDY MODE</div>
          <div style={{
            fontFamily: 'JetBrains Mono, monospace', fontSize: 9,
            color: TC.dim, letterSpacing: 1, marginTop: 2,
          }}>
            Q.{String(qIdx + 1).padStart(2, '0')} / {TOTAL}
          </div>
        </div>
        <div style={{
          fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
          color: TC.green, letterSpacing: 1,
        }}>
          ✓ {String(correct).padStart(2, '0')}
        </div>
      </div>

      {/* progress */}
      <div style={{ padding: '10px 14px 0' }}>
        <div style={{ display: 'flex', gap: 2, height: 4 }}>
          {Array.from({length: TOTAL}).map((_, i) => (
            <div key={i} style={{
              flex: 1,
              background: i < qIdx ? TC.green : i === qIdx ? TC.amber : TC.line,
            }}/>
          ))}
        </div>
      </div>

      {/* direction tag */}
      <div style={{ padding: '18px 14px 4px' }}>
        <div style={{
          fontFamily: 'JetBrains Mono, monospace', fontSize: 9,
          color: TC.amber, letterSpacing: 2,
        }}>
          [ {isEn ? 'EN → JA' : 'JA → EN'} ]
        </div>
      </div>

      {/* prompt — with 3D tilt card */}
      <div style={{ padding: '8px 14px 20px', perspective: 600 }}>
        <div style={{
          padding: '28px 18px', background: TC.panelHi,
          border: `1px solid ${TC.lineHi}`,
          borderLeft: `3px solid ${TC.green}`,
          transform: 'rotateX(3deg)',
          transformOrigin: 'top center',
          boxShadow: `0 4px 0 ${TC.line}, 0 10px 24px rgba(158,255,0,0.06)`,
          position: 'relative',
        }}>
          <div style={{
            position: 'absolute', top: 6, right: 8,
            fontFamily: 'JetBrains Mono, monospace', fontSize: 8,
            color: TC.dim, letterSpacing: 1,
          }}>
            {q.word.cat} · {q.word.en.length} CHAR
          </div>
          <div style={{
            fontFamily: isEn ? 'Helvetica Neue, Helvetica, Arial, sans-serif'
                              : '"Noto Sans JP", sans-serif',
            fontWeight: 900,
            fontSize: isEn ? (prompt.length > 9 ? 34 : 44) : 32,
            color: TC.ink, letterSpacing: isEn ? -1.2 : 0,
            lineHeight: 1,
            textTransform: isEn ? 'lowercase' : 'none',
          }}>
            {shown}
            {shown.length < prompt.length && (
              <span style={{ color: TC.green, marginLeft: 2 }}>▌</span>
            )}
          </div>
          {selected !== null && fb === 'ERR' && (
            <div style={{

// ─── compete mode ──────────────────────────────────────────
function CompeteScreen({ nav, finish }) {
  const TOTAL = 5;
  const [qIdx, setQIdx] = useState(0);
  const [questions] = useState(() => {
    const eligible = WORDS.filter(w => w.en.length >= 5 && w.en.length <= 12);
    return pick(eligible, TOTAL);
  });
  const [typed, setTyped] = useState([]);
  const [misses, setMisses] = useState(0);
  const [totalScore, setTotalScore] = useState(0);
  const [correctCount, setCorrectCount] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  const [qStartTime, setQStartTime] = useState(Date.now());
  const [shake, setShake] = useState(false);
  const [fx, setFx] = useState(null);
  const [locked, setLocked] = useState(false);

  const q = questions[qIdx];
  const target = q.en.toLowerCase();
  const [candidates, setCandidates] = useState(() => makeCandidates(questions[0].en));

  useEffect(() => {
    setCandidates(makeCandidates(q.en));
    setTyped([]); setMisses(0);
    setQStartTime(Date.now());
    setLocked(false);
  }, [qIdx]);

  useEffect(() => {
    const t = setInterval(() => setElapsed(Date.now() - qStartTime), 50);
    return () => clearInterval(t);
  }, [qStartTime]);

  function makeCandidates(word) {
    const letters = word.toLowerCase().split('');
    const unique = [...new Set(letters)];
    const need = 12 - unique.length;
    const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('').filter(c => !unique.includes(c));
    const dummies = pick(alphabet, Math.max(0, need));
    return [...unique, ...dummies].sort(() => Math.random() - 0.5).map((c, i) => ({ id: i, c }));
  }

  const tap = (letter) => {
    if (locked) return;
    const nextPos = typed.length;
    if (letter === target[nextPos]) {
      const newTyped = [...typed, letter];
      setTyped(newTyped);
      if (newTyped.length === target.length) {
        setLocked(true);
        const secs = (Date.now() - qStartTime) / 1000;
        const score = Math.max(0, Math.round(100 - secs * 2 - misses * 5));
        setTotalScore(s => s + score);
        setCorrectCount(c => c + 1);
        setFx('OK');
        setTimeout(() => {
          setFx(null);
          if (qIdx + 1 >= TOTAL) {
            finish({ mode: 'compete', correct: correctCount + 1, total: TOTAL, score: totalScore + score, time: secs });
          } else {
            setQIdx(qIdx + 1);
          }
        }, 750);
      }
    } else {
      setMisses(m => m + 1);
      setShake(true);
      setTimeout(() => setShake(false), 350);
    }
  };

  const backspace = () => { if (!locked) setTyped(t => t.slice(0, -1)); };

  return (
    <div style={{ minHeight: '100%', display: 'flex', flexDirection: 'column', position: 'relative' }}>
      <div style={{
        padding: '12px 14px',
        borderBottom: `1px solid ${TC.lineHi}`,
        display: 'flex', alignItems: 'center', gap: 10,
      }}>
        <button onClick={() => nav('home')} style={backBtn}>&lt; ESC</button>
        <div style={{ flex: 1 }}>
          <div style={labelStyle}>COMPETE MODE</div>
          <div style={{
            fontFamily: 'JetBrains Mono, monospace', fontSize: 9,
            color: TC.dim, letterSpacing: 1, marginTop: 2,
          }}>
            Q.{String(qIdx + 1).padStart(2, '0')} / {TOTAL}
          </div>
        </div>
        <div style={{
          fontFamily: 'JetBrains Mono, monospace', fontSize: 18, fontWeight: 700,
          color: TC.amber, letterSpacing: 1,
          fontVariantNumeric: 'tabular-nums',
        }}>
          {(elapsed / 1000).toFixed(2)}
        </div>
      </div>

      {/* KPI strip */}
      <div style={{
        display: 'grid', gridTemplateColumns: '1fr 1fr 1fr',
        background: TC.lineHi, gap: 1, borderBottom: `1px solid ${TC.lineHi}`,
      }}>
        <MiniKPI label="SCORE" value={totalScore} tone={TC.green}/>
        <MiniKPI label="MISS" value={misses} tone={misses > 0 ? TC.red : TC.ink}/>
        <MiniKPI label="DONE" value={`${correctCount}/${TOTAL}`} tone={TC.ink}/>
      </div>

      {/* question */}
      <div style={{ padding: '20px 14px 12px', textAlign: 'center' }}>
        <div style={{
          fontFamily: 'JetBrains Mono, monospace', fontSize: 9,
          color: TC.amber, letterSpacing: 2, marginBottom: 10,
        }}>
          [ TRANSLATE · {target.length} CHAR ]
        </div>
        <div style={{
          fontFamily: '"Noto Sans JP", sans-serif', fontWeight: 900,
          fontSize: 30, color: TC.ink, letterSpacing: -0.5, lineHeight: 1.15,
        }}>
          {q.ja}
        </div>
      </div>

      {/* typed slots */}
      <div style={{
        padding: '12px 14px',
        display: 'flex', justifyContent: 'center', gap: 4,
        animation: shake ? 'glitch .35s' : '',
      }}>
        {target.split('').map((_, i) => {
          const ch = typed[i];
          const filled = ch !== undefined;
          const isCursor = i === typed.length && !locked;
          return (
            <div key={i} style={{
              width: 24, height: 36,
              border: `1px solid ${filled ? TC.green : isCursor ? TC.amber : TC.line}`,
              background: filled ? 'rgba(158,255,0,0.10)' : TC.panel,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: 'JetBrains Mono, monospace', fontSize: 16, fontWeight: 700,
              color: filled ? TC.green : TC.ink,
              textTransform: 'uppercase',
              boxShadow: isCursor ? `inset 0 -3px 0 ${TC.amber}` : 'none',
            }}>
              {ch || (isCursor ? '_' : '')}
            </div>
          );
        })}
      </div>

      <div style={{ flex: 1 }}/>

      {/* keypad */}
      <div style={{ padding: '0 14px 8px' }}>
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 4,
        }}>
          {candidates.map(c => (
            <button key={c.id} onClick={() => tap(c.c)} disabled={locked} style={{
              aspectRatio: '1',
              background: TC.panel, border: `1px solid ${TC.lineHi}`,
              color: TC.ink,
              fontFamily: 'JetBrains Mono, monospace',
              fontSize: 16, fontWeight: 700, textTransform: 'uppercase',
              cursor: 'pointer',
              boxShadow: `0 2px 0 ${TC.line}`,
            }}>
              {c.c}
            </button>
          ))}
        </div>
        <button onClick={backspace} style={{
          width: '100%', marginTop: 6, padding: '10px',
          background: TC.panel, border: `1px solid ${TC.lineHi}`,
          color: TC.amber, fontFamily: 'JetBrains Mono, monospace',
          fontSize: 10, letterSpacing: 2, fontWeight: 700,
          cursor: 'pointer',
        }}>
          ◀ DELETE
        </button>
      </div>

      <StatusLine
        left="LIVE"
        mid={fx === 'OK' ? 'SUBMITTED' : shake ? 'INVALID KEY' : 'TYPING ...'}
        right={`T+${(elapsed/1000).toFixed(1)}s`}
      />

      {fx === 'OK' && <OKOverlay/>}
    </div>
  );
}

                position: 'absolute', bottom: -14, left: 0, right: 0,

      {/* history ledger */}
      <div style={{ padding: '10px 14px 0' }}>
        <div style={labelStyle}>TRANSACTION LOG</div>

      <div style={{
        margin: '8px 14px 14px',
        border: `1px solid ${TC.line}`,
      }}>
        <div style={{
          padding: '6px 10px',
          display: 'grid', gridTemplateColumns: '20px 52px 1fr 50px',
          fontFamily: 'JetBrains Mono, monospace', fontSize: 8,
          color: TC.dim, letterSpacing: 2,
          background: TC.panel,
          borderBottom: `1px solid ${TC.line}`,
        }}>
          <span></span>
          <span>MODE</span>
          <span>TIMESTAMP</span>
          <span style={{ textAlign: 'right' }}>PTS</span>
        </div>
        {history.map((h, i) => (
          <div key={i} style={{
            padding: '8px 10px',
            display: 'grid', gridTemplateColumns: '20px 52px 1fr 50px',
            fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
            color: TC.ink, alignItems: 'center',
            borderBottom: i < history.length - 1 ? `1px solid ${TC.line}` : 'none',
          }}>
            <span style={{
              color: h.mode === 'study' ? TC.green : TC.amber,
              fontWeight: 700,
            }}>
              {h.mode === 'study' ? 'A' : 'B'}
            </span>
            <span style={{ color: TC.mid, fontSize: 9 }}>
              {h.correct}/{h.total}
            </span>
            <span style={{ color: TC.dim, fontSize: 9 }}>
              {h.at}

            <span style={{
              textAlign: 'right', fontWeight: 700, color: TC.ink,
              fontVariantNumeric: 'tabular-nums',
            }}>

        ))}
      </div>

      <div style={{ flex: 1 }}/>
      <StatusLine left="SYNCED" mid={`${history.length} ENTRIES`} right="OK"/>
    </div>
  );
}

  <!-- App entry -->
  <script type="text/babel" data-presets="react">
    const TICKER_ITEMS = [
      { sym: 'ACCRUAL', val: '発生主義', chg: 1.24 },
      { sym: 'DEBIT', val: '借方', chg: -0.44 },
      { sym: 'EQUITY', val: '資本', chg: 2.10 },
      { sym: 'GOODWILL', val: 'のれん', chg: -1.08 },
      { sym: 'AUDIT', val: '監査', chg: 0.62 },
      { sym: 'DEFERRED', val: '繰延', chg: -0.30 },
      { sym: 'IMPAIRMENT', val: '減損', chg: 0.88 },
      { sym: 'ASSET', val: '資産', chg: 1.02 },
      { sym: 'REVENUE', val: '収益', chg: -0.14 },
      { sym: 'PAYABLE', val: '買掛金', chg: 0.44 },
    ];

    function App() {
      const [screen, setScreen] = useState('boot');
      const [player, setPlayer] = useState(null);
      const [result, setResult] = useState(null);

      const nav = (to) => {
        if ((to === 'study' || to === 'compete' || to === 'mypage') && !player) {
          setScreen('boot'); return;
        }
        if (to === 'register') { setScreen('boot'); return; }
        setScreen(to);
      };
      const setPlayerAndGo = (p) => {
        setPlayer({ ...p, weekCorrect: 0, weekRank: 4 });
      };
      const finish = (r) => {
        setResult(r);
        if (player) {
          setPlayer(p => ({
            ...p,
            weekCorrect: (p.weekCorrect || 0) + r.correct,
            weekRank: 4,
          }));
        }
        setScreen('result');
      };

      return (
        <>
          <div className="screen-root" key={screen} style={{ minHeight: '100%' }}>
            {screen === 'boot' && <BootScreen nav={nav} setPlayer={setPlayerAndGo}/>}
            {screen === 'home' && <HomeScreen nav={nav} player={player}/>}
            {screen === 'study' && <StudyScreen nav={nav} finish={finish}/>}
            {screen === 'compete' && <CompeteScreen nav={nav} finish={finish}/>}
            {screen === 'result' && <ResultScreen nav={nav} result={result} player={player}/>}
            {screen === 'ranking' && <RankingScreen nav={nav} player={player}/>}
            {screen === 'mypage' && <MyPageScreen nav={nav} player={player}/>}
          </div>
        </>
      );
    }

    function TickerMount() {
      return <Ticker items={TICKER_ITEMS}/>;
    }

    ReactDOM.createRoot(document.getElementById('ticker-mount')).render(<TickerMount/>);
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <script>
    // CDN読み込み失敗検出
    window.addEventListener('load', function() {
      setTimeout(function() {
        if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof Babel === 'undefined') {
          var e = document.getElementById('cdn-error');
          if (e) e.style.display = 'block';
        }
      }, 2000);
    });
  </script>
